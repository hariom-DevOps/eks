apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-deployment
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app-container
          image: <your_account_id>.dkr.ecr.<your-region>.amazonaws.com/my-demo-repo:latest
          ports:
            - containerPort: 8080
